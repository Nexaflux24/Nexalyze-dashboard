<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexalyze Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold text-blue-600">Nexalyze Dashboard</h1>
    <div>
      <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Login</button>
    </div>
  </nav>

  <!-- Sidebar + Content -->
  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white p-6 h-screen shadow">
      <ul>
        <li class="mb-4 font-semibold text-gray-700">Dashboard</li>
        <li class="mb-4 text-gray-600 hover:text-blue-500 cursor-pointer">Analytics</li>
        <li class="mb-4 text-gray-600 hover:text-blue-500 cursor-pointer">Campaigns</li>
        <li class="mb-4 text-gray-600 hover:text-blue-500 cursor-pointer">Settings</li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Traffic Overview</h2>
      <div class="bg-white p-4 rounded shadow">
        <canvas id="trafficChart" class="w-full h-64"></canvas>
      </div>
    </main>
  </div>

  <script src="main.js" defer></script>
</body>
</html>
