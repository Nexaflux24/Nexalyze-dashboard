<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description" content="Nexalyze Dashboard - Analytics and traffic monitoring">
  <meta name="theme-color" content="#1e40af">

  <title>Nexalyze Dashboard</title>

  <!-- CDN -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1" defer></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <style>
    html { scroll-behavior: smooth; }
    body { font-size: 16px; }
    .page { display: none; }
    .page.active { display: block; }

    .nav-item.active {
      background-color: #1e3a8a;
      border-radius: 0.375rem;
      padding: 0.5rem;
    }

    @media (max-width: 640px) {
      body { font-size: 14px; }
    }
  </style>
</head>

<body class="bg-gray-100">

  <div class="flex h-screen flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-800 text-white p-4">
      <h2 class="text-2xl font-bold mb-6">Nexalyze</h2>
      <ul>
        <li data-page="dashboard" class="nav-item active cursor-pointer mb-2 p-2 rounded hover:bg-blue-700">Dashboard</li>
        <li data-page="campaigns" class="nav-item cursor-pointer mb-2 p-2 rounded hover:bg-blue-700">Campaigns</li>
        <li data-page="analytics" class="nav-item cursor-pointer mb-2 p-2 rounded hover:bg-blue-700">Analytics</li>
        <li data-page="logout" class="nav-item cursor-pointer p-2 rounded hover:bg-blue-700">Logout</li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="flex-1 p-6 overflow-y-auto">

      <!-- Navbar -->
      <div class="bg-white shadow p-4 mb-6 flex justify-between">
        <h1 class="text-xl font-semibold">Nexalyze</h1>
        <span class="text-sm text-gray-500">Admin</span>
      </div>

      <!-- Dashboard -->
      <section id="dashboard" class="page active">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div class="bg-white p-4 shadow rounded h-72">
            <h2 class="text-lg font-bold mb-2">Traffic Overview</h2>
            <canvas id="trafficChart"></canvas>
          </div>

          <div class="bg-white p-4 shadow rounded h-72">
            <h2 class="text-lg font-bold mb-2">Bounce Rate</h2>
            <canvas id="bounceChart"></canvas>
          </div>

        </div>
      </section>

      <!-- Campaigns -->
      <section id="campaigns" class="page">
        <div class="bg-white p-6 shadow rounded">
          <h1 class="text-xl font-bold mb-4">Campaigns</h1>
          <p>List of campaigns will appear here.</p>
        </div>
      </section>

      <!-- Analytics -->
      <section id="analytics" class="page">
        <div class="bg-white p-6 shadow rounded">
          <h1 class="text-xl font-bold mb-4">Analytics</h1>
          <p>Charts and analytics data will go here.</p>
        </div>
      </section>

      <!-- Logout -->
      <section id="logout" class="page">
        <div class="bg-white p-6 shadow rounded">
          <h1 class="text-xl font-bold mb-4">Logged out</h1>
          <p>Redirecting...</p>
        </div>
      </section>

    </main>
  </div>

  <!-- JS -->
  <script src="main.js"></script>

</body>
</html>
