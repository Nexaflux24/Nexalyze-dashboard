<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexalyze Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .page { display: none; }
    .page.active { display: block; }
    .nav-item.active {
      background-color: #1e3a8a;
      border-radius: 0.375rem;
      padding: 0.5rem;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-blue-800 text-white p-4">
      <h2 class="text-2xl font-bold mb-6">Nexalyze</h2>
      <nav>
        <ul>
          <li data-page="dashboard" class="nav-item active cursor-pointer mb-2">Dashboard</li>
          <li data-page="campaigns" class="nav-item cursor-pointer mb-2">Campaigns</li>
          <li data-page="analytics" class="nav-item cursor-pointer mb-2">Analytics</li>
          <li data-page="logout" class="nav-item cursor-pointer">Logout</li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 overflow-y-auto">
      <!-- Navbar -->
      <div class="bg-white shadow p-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-semibold">Nexalyze</h1>
        <span id="user-role" class="text-sm text-gray-500">Admin</span>
      </div>

      <!-- Page Sections -->
      <section id="dashboard" class="page active">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="bg-white p-4 shadow rounded h-[300px]">
            <h2 class="text-lg font-bold mb-2">Traffic Overview</h2>
            <div class="h-full">
              <canvas id="trafficChart" class="w-full h-full"></canvas>
            </div>
          </div>
          <div class="bg-white p-4 shadow rounded h-[300px]">
            <h2 class="text-lg font-bold mb-2">Bounce Rate</h2>
            <div class="h-full">
              <canvas id="bounceChart" class="w-full h-full"></canvas>
            </div>
          </div>
        </div>
      </section>

      <section id="campaigns" class="page">
        <div class="bg-white p-6 shadow rounded">
          <h1 class="text-xl font-bold mb-4">Campaigns</h1>
          <p>List of campaigns will appear here.</p>
        </div>
      </section>

      <section id="analytics" class="page">
        <div class="bg-white p-6 shadow rounded">
          <h1 class="text-xl font-bold mb-4">Analytics</h1>
          <p>Charts and analytics data will go here.</p>
        </div>
      </section>

      <section id="logout" class="page">
        <div class="bg-white p-6 shadow rounded">
          <h1 class="text-xl font-bold mb-4">You’ve been logged out</h1>
          <p>Redirecting to login...</p>
        </div>
      </section>
    </main>
  </div>

  <!-- ✅ External JavaScript -->
  <script src="main.js" defer></script>
</body>
</html>
